name: deploy

# forgejo (primary) push-mirrors to this github repo, which triggers this deploy.
# edit functions/_people.js, push to forgejo, and the site redeploys itself.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # unlike keys, this project has a dependency (qrcode-generator) that the
      # functions bundler has to resolve at build time. without this the deploy
      # fails with 'could not resolve "qrcode-generator"'.
      - name: install deps
        run: npm ci
      - name: deploy to cloudflare pages
        run: npx wrangler@latest pages deploy public --project-name card --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
